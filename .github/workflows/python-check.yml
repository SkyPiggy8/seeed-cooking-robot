name: Python Check

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -e .
      - run: python scripts/test_camera.py
      - run: python scripts/test_detection.py
      - run: python scripts/test_handeye.py
      - run: python scripts/test_pick_place.py --object tomato --target bowl
